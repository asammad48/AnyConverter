<svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Globe circle -->
  <circle cx="18" cy="20" r="12" stroke="#B04A45" stroke-width="2" fill="none"/>
  <!-- Vertical meridian -->
  <line x1="18" y1="8" x2="18" y2="32" stroke="#B04A45" stroke-width="1.5" opacity="0.6"/>
  <!-- Horizontal equator -->
  <line x1="6" y1="20" x2="30" y2="20" stroke="#B04A45" stroke-width="1.5" opacity="0.6"/>
  <!-- Longitude curves -->
  <path d="M18 8 Q12 14 12 20 Q12 26 18 32" stroke="#B04A45" stroke-width="1.4" fill="none" opacity="0.7"/>
  <path d="M18 8 Q24 14 24 20 Q24 26 18 32" stroke="#B04A45" stroke-width="1.4" fill="none" opacity="0.7"/>
  <!-- Location pin (bottom-right, overlapping) -->
  <circle cx="30" cy="28" r="5" fill="#B04A45" opacity="0.25" stroke="#B04A45" stroke-width="1.5"/>
  <circle cx="30" cy="26.5" r="2" fill="#B04A45"/>
  <path d="M28 28.5 Q30 33 30 33 Q30 33 32 28.5" fill="#B04A45"/>
</svg>
