<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40">
  <!-- Left currency symbol $ -->
  <text x="12" y="24" font-family="Georgia,serif" font-size="15" font-weight="700" fill="#B04A45" text-anchor="middle" opacity="0.95">$</text>
  <!-- Right currency symbol € -->
  <text x="28" y="24" font-family="Georgia,serif" font-size="15" font-weight="700" fill="#B04A45" text-anchor="middle" opacity="0.95">€</text>
  <!-- Exchange arrows -->
  <path d="M16,16 L24,16" fill="none" stroke="#B04A45" stroke-width="1.8" stroke-linecap="round"/>
  <polyline points="22,14 24,16 22,18" fill="none" stroke="#B04A45" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M24,28 L16,28" fill="none" stroke="#B04A45" stroke-width="1.8" stroke-linecap="round"/>
  <polyline points="18,26 16,28 18,30" fill="none" stroke="#B04A45" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
