<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40">
  <!-- Stack of pages -->
  <rect x="13" y="12" width="16" height="20" rx="2" fill="#B04A45" opacity="0.15"/>
  <rect x="13" y="12" width="16" height="20" rx="2" fill="none" stroke="#B04A45" stroke-width="1.5" opacity="0.5"/>
  <rect x="11" y="10" width="16" height="20" rx="2" fill="#B04A45" opacity="0.2"/>
  <rect x="11" y="10" width="16" height="20" rx="2" fill="none" stroke="#B04A45" stroke-width="1.5" opacity="0.7"/>
  <rect x="9" y="8" width="16" height="20" rx="2" fill="#B04A45" opacity="0.25"/>
  <rect x="9" y="8" width="16" height="20" rx="2" fill="none" stroke="#B04A45" stroke-width="1.8"/>
  <!-- Reorder arrows on top page -->
  <line x1="12" y1="13" x2="22" y2="13" stroke="#B04A45" stroke-width="1.4" stroke-linecap="round" opacity="0.8"/>
  <line x1="12" y1="17" x2="22" y2="17" stroke="#B04A45" stroke-width="1.4" stroke-linecap="round" opacity="0.8"/>
  <line x1="12" y1="21" x2="18" y2="21" stroke="#B04A45" stroke-width="1.4" stroke-linecap="round" opacity="0.6"/>
  <!-- Up/down arrows on right -->
  <polyline points="27,16 29,13 31,16" fill="none" stroke="#B04A45" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
  <polyline points="27,22 29,25 31,22" fill="none" stroke="#B04A45" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="29" y1="13" x2="29" y2="25" stroke="#B04A45" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
</svg>
