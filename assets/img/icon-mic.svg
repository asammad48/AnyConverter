<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40">
  <!-- Mic capsule -->
  <rect x="15" y="7" width="10" height="16" rx="5" fill="#B04A45" opacity="0.25"/>
  <rect x="15" y="7" width="10" height="16" rx="5" fill="none" stroke="#B04A45" stroke-width="2"/>
  <!-- Sound wave lines inside mic -->
  <line x1="17.5" y1="12" x2="22.5" y2="12" stroke="#B04A45" stroke-width="1.4" stroke-linecap="round" opacity="0.7"/>
  <line x1="17.5" y1="15" x2="22.5" y2="15" stroke="#B04A45" stroke-width="1.4" stroke-linecap="round" opacity="0.7"/>
  <line x1="17.5" y1="18" x2="22.5" y2="18" stroke="#B04A45" stroke-width="1.4" stroke-linecap="round" opacity="0.5"/>
  <!-- Arm arc -->
  <path d="M11,20 Q11,29 20,29 Q29,29 29,20" fill="none" stroke="#B04A45" stroke-width="2" stroke-linecap="round"/>
  <!-- Stand -->
  <line x1="20" y1="29" x2="20" y2="34" stroke="#B04A45" stroke-width="2" stroke-linecap="round"/>
  <!-- Base -->
  <line x1="14" y1="34" x2="26" y2="34" stroke="#B04A45" stroke-width="2" stroke-linecap="round"/>
</svg>
