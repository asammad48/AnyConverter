<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF6B35"/>
      <stop offset="100%" stop-color="#F7C948"/>
    </linearGradient>
  </defs>
  <rect width="40" height="40" rx="10" fill="url(#g)"/>
  <!-- Mic capsule -->
  <rect x="15" y="7" width="10" height="16" rx="5" fill="white" opacity="0.25"/>
  <rect x="15" y="7" width="10" height="16" rx="5" fill="none" stroke="white" stroke-width="2"/>
  <!-- Sound wave lines inside mic -->
  <line x1="17.5" y1="12" x2="22.5" y2="12" stroke="white" stroke-width="1.4" stroke-linecap="round" opacity="0.7"/>
  <line x1="17.5" y1="15" x2="22.5" y2="15" stroke="white" stroke-width="1.4" stroke-linecap="round" opacity="0.7"/>
  <line x1="17.5" y1="18" x2="22.5" y2="18" stroke="white" stroke-width="1.4" stroke-linecap="round" opacity="0.5"/>
  <!-- Arm arc -->
  <path d="M11,20 Q11,29 20,29 Q29,29 29,20" fill="none" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <!-- Stand -->
  <line x1="20" y1="29" x2="20" y2="34" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <!-- Base -->
  <line x1="14" y1="34" x2="26" y2="34" stroke="white" stroke-width="2" stroke-linecap="round"/>
</svg>
