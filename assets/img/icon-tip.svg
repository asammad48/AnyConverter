<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40">
  <!-- Bill/note -->
  <rect x="7" y="13" width="22" height="14" rx="2.5" fill="#B04A45" opacity="0.25"/>
  <rect x="7" y="13" width="22" height="14" rx="2.5" fill="none" stroke="#B04A45" stroke-width="1.8"/>
  <!-- Dollar sign on bill -->
  <text x="18" y="23" font-family="Georgia,serif" font-size="11" font-weight="700" fill="#B04A45" text-anchor="middle">$</text>
  <!-- Split arrow (dividing bill) -->
  <line x1="30" y1="14" x2="30" y2="26" stroke="#B04A45" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <!-- People icons (2 small figures) -->
  <circle cx="28" cy="30" r="2" fill="#B04A45" opacity="0.85"/>
  <circle cx="34" cy="30" r="2" fill="#B04A45" opacity="0.85"/>
  <path d="M25,36 Q25,33 28,33 Q31,33 31,36" fill="#B04A45" opacity="0.7"/>
  <path d="M31,36 Q31,33 34,33 Q37,33 37,36" fill="#B04A45" opacity="0.7"/>
</svg>
