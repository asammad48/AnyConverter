<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40">
  <!-- Speedometer arc (half circle) -->
  <path d="M9,26 A11,11 0 0,1 31,26" fill="none" stroke="#B04A45" stroke-width="2.2" stroke-linecap="round" opacity="0.5"/>
  <!-- Speed arc (filled portion ~70%) -->
  <path d="M9,26 A11,11 0 0,1 27.5,16" fill="none" stroke="#B04A45" stroke-width="2.2" stroke-linecap="round"/>
  <!-- Tick marks -->
  <line x1="9" y1="26" x2="10.8" y2="26" stroke="#B04A45" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="11.5" y1="18.5" x2="12.8" y2="19.8" stroke="#B04A45" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="20" y1="15" x2="20" y2="16.8" stroke="#B04A45" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="28.5" y1="18.5" x2="27.2" y2="19.8" stroke="#B04A45" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="31" y1="26" x2="29.2" y2="26" stroke="#B04A45" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Needle pointing to ~70% -->
  <line x1="20" y1="26" x2="26" y2="17" stroke="#B04A45" stroke-width="2" stroke-linecap="round"/>
  <!-- Center hub -->
  <circle cx="20" cy="26" r="2.5" fill="#B04A45"/>
  <!-- Speed label -->
  <rect x="15" y="28" width="10" height="4" rx="2" fill="#B04A45" opacity="0.3"/>
</svg>
