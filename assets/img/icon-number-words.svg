<svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- "42" numeral on the left -->
  <!-- 4: vertical + horizontal + down stroke -->
  <line x1="8"  y1="10" x2="8"  y2="17" stroke="#B04A45" stroke-width="2.1" stroke-linecap="round"/>
  <line x1="8"  y1="17" x2="14" y2="17" stroke="#B04A45" stroke-width="2.1" stroke-linecap="round"/>
  <line x1="14" y1="10" x2="14" y2="22" stroke="#B04A45" stroke-width="2.1" stroke-linecap="round"/>
  <!-- 2: curve top, diagonal, base line -->
  <path d="M17 12 Q17 10 19.5 10 Q22 10 22 13 Q22 15 18 18 L17 22 L22 22" stroke="#B04A45" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Arrow right -->
  <line x1="24" y1="16" x2="31" y2="16" stroke="#B04A45" stroke-width="2.1" stroke-linecap="round"/>
  <polyline points="28,13 31,16 28,19" stroke="#B04A45" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Text lines (word representation) -->
  <line x1="6"  y1="27" x2="22" y2="27" stroke="#B04A45" stroke-width="2" stroke-linecap="round"/>
  <line x1="6"  y1="32" x2="17" y2="32" stroke="#B04A45" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  <!-- Word "dots" to hint at text -->
  <circle cx="26" cy="27" r="1.5" fill="#B04A45" opacity="0.8"/>
  <circle cx="30" cy="27" r="1.5" fill="#B04A45" opacity="0.8"/>
  <circle cx="34" cy="27" r="1.5" fill="#B04A45" opacity="0.8"/>
</svg>
