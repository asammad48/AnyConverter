<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40">
  <!-- Fork / decision tree arrows -->
  <!-- Stem coming in from left -->
  <line x1="8" y1="20" x2="18" y2="20" stroke="#B04A45" stroke-width="2.2" stroke-linecap="round"/>
  <!-- Branch up-right -->
  <path d="M18,20 Q22,20 24,14 L30,14" fill="none" stroke="#B04A45" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
  <polyline points="28,12 30,14 28,16" fill="none" stroke="#B04A45" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Branch down-right -->
  <path d="M18,20 Q22,20 24,26 L30,26" fill="none" stroke="#B04A45" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
  <polyline points="28,24 30,26 28,28" fill="none" stroke="#B04A45" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Decision node circle -->
  <circle cx="18" cy="20" r="3" fill="#B04A45"/>
</svg>
