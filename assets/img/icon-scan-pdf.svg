<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40">
  <!-- Document being scanned -->
  <path d="M10,9 L24,9 L28,13 L28,31 L10,31 Z" fill="#B04A45" opacity="0.2"/>
  <path d="M10,9 L24,9 L28,13 L28,31 L10,31 Z" fill="none" stroke="#B04A45" stroke-width="1.8" stroke-linejoin="round"/>
  <path d="M24,9 L24,13 L28,13" fill="none" stroke="#B04A45" stroke-width="1.5" stroke-linejoin="round"/>
  <!-- Scan beam line (cyan) -->
  <line x1="8" y1="22" x2="30" y2="22" stroke="#67E8F9" stroke-width="2.2" stroke-linecap="round" opacity="0.9"/>
  <!-- Scan glow above/below beam -->
  <rect x="10" y="18" width="18" height="4" rx="0" fill="#67E8F9" opacity="0.15"/>
  <!-- Corner scan brackets -->
  <path d="M8,17 L8,13 L12,13" fill="none" stroke="#B04A45" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" opacity="0.7"/>
  <path d="M30,17 L30,13 L26,13" fill="none" stroke="#B04A45" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" opacity="0.7"/>
</svg>
