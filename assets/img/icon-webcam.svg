<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40">
  <!-- Camera body -->
  <rect x="7" y="13" width="26" height="18" rx="4" fill="none" stroke="#B04A45" stroke-width="2"/>
  <!-- Lens outer ring -->
  <circle cx="20" cy="22" r="7" fill="none" stroke="#B04A45" stroke-width="1.8"/>
  <!-- Lens middle ring -->
  <circle cx="20" cy="22" r="4.5" fill="#B04A45" opacity="0.2"/>
  <!-- Lens inner -->
  <circle cx="20" cy="22" r="2.5" fill="#B04A45" opacity="0.7"/>
  <!-- Lens shine -->
  <circle cx="18.5" cy="20.5" r="1" fill="#B04A45" opacity="0.9"/>
  <!-- Record light (red dot top right) -->
  <circle cx="30" cy="16" r="2" fill="#FF4444"/>
  <!-- Camera top notch -->
  <rect x="17" y="10" width="6" height="4" rx="2" fill="none" stroke="#B04A45" stroke-width="1.8"/>
</svg>
