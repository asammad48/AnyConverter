<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF6B6B"/>
      <stop offset="50%" stop-color="#A855F7"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
  </defs>
  <rect width="40" height="40" rx="10" fill="url(#g)"/>
  <!-- Monitor frame -->
  <rect x="5" y="8" width="30" height="20" rx="3" fill="none" stroke="white" stroke-width="2"/>
  <!-- Color test bars inside screen -->
  <clipPath id="sc"><rect x="7" y="10" width="26" height="16" rx="1"/></clipPath>
  <rect x="7"  y="10" width="4.3" height="16" fill="white" opacity="0.9" clip-path="url(#sc)"/>
  <rect x="11.3" y="10" width="4.3" height="16" fill="white" opacity="0.55" clip-path="url(#sc)"/>
  <rect x="15.6" y="10" width="4.3" height="16" fill="white" opacity="0.75" clip-path="url(#sc)"/>
  <rect x="19.9" y="10" width="4.3" height="16" fill="white" opacity="0.4" clip-path="url(#sc)"/>
  <rect x="24.2" y="10" width="4.3" height="16" fill="white" opacity="0.65" clip-path="url(#sc)"/>
  <rect x="28.5" y="10" width="4.5" height="16" fill="white" opacity="0.2" clip-path="url(#sc)"/>
  <!-- Stand -->
  <line x1="20" y1="28" x2="20" y2="33" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <line x1="14" y1="33" x2="26" y2="33" stroke="white" stroke-width="2" stroke-linecap="round"/>
</svg>
