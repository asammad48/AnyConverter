  <path d="M20,6 L20,11 L25,11" fill="none" stroke="white" stroke-width="1.5" stroke-linejoin="round"/>
  <!-- Open lock body -->
  <rect x="13" y="22" width="10" height="8" rx="2" fill="white" opacity="0.9"/>
  <!-- Open shackle (tilted open to the right) -->
  <path d="M15,22 L15,19 Q15,15 18,15 Q21,15 21,19" fill="none" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <path d="M21,19 Q21,16 24,16 Q27,16 27,19" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
  <!-- Key icon on lock -->
  <circle cx="17" cy="25.5" r="1.5" fill="#1D4ED8"/>
  <rect x="16.3" y="25.5" width="3.5" height="1.2" rx="0.4" fill="#1D4ED8"/>
  <!-- Green tick badge -->
  <circle cx="30" cy="12" r="5.5" fill="#22C55E"/>
  <polyline points="27.5,12 29.5,14 33,10" fill="none" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
