<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF416C"/>
      <stop offset="100%" stop-color="#FF4B2B"/>
    </linearGradient>
  </defs>
  <rect width="40" height="40" rx="10" fill="url(#g)"/>
  <!-- Clock face -->
  <circle cx="20" cy="21" r="11" fill="none" stroke="white" stroke-width="2.2"/>
  <!-- Clock hands at ~10:10 -->
  <line x1="20" y1="21" x2="14.5" y2="14.5" stroke="white" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="20" y1="21" x2="25.5" y2="14.5" stroke="white" stroke-width="2.2" stroke-linecap="round"/>
  <circle cx="20" cy="21" r="1.8" fill="white"/>
  <!-- Clock tick marks at 12/3/6/9 -->
  <line x1="20" y1="10.5" x2="20" y2="12.5" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="30.5" y1="21" x2="28.5" y2="21" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="20" y1="31.5" x2="20" y2="29.5" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="9.5" y1="21" x2="11.5" y2="21" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Crown / alarm bump -->
  <rect x="18" y="9" width="4" height="2.5" rx="1.2" fill="white"/>
</svg>
