<svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Outer color wheel ring -->
  <circle cx="20" cy="20" r="11" stroke="#B04A45" stroke-width="1.8" fill="none" opacity="0.5"/>
  <!-- Three overlapping primary color circles -->
  <circle cx="17" cy="17" r="6" fill="#60A5FA" opacity="0.85"/>
  <circle cx="23" cy="17" r="6" fill="#FBBF24" opacity="0.85"/>
  <circle cx="20" cy="23" r="6" fill="#F87171" opacity="0.85"/>
  <!-- White center overlap -->
  <circle cx="20" cy="19" r="2.5" fill="#B04A45" opacity="0.9"/>
</svg>
