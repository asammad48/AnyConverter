<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#283593"/>
      <stop offset="100%" stop-color="#1565C0"/>
    </linearGradient>
  </defs>
  <rect width="40" height="40" rx="10" fill="url(#g)"/>
  <!-- Monitor frame -->
  <rect x="5" y="9" width="30" height="20" rx="3" fill="none" stroke="white" stroke-width="2"/>
  <!-- Screen fill -->
  <rect x="8" y="12" width="24" height="14" rx="1" fill="white" opacity="0.12"/>
  <!-- Pixel grid lines -->
  <line x1="16" y1="12" x2="16" y2="26" stroke="white" stroke-width="1" opacity="0.3"/>
  <line x1="24" y1="12" x2="24" y2="26" stroke="white" stroke-width="1" opacity="0.3"/>
  <line x1="8" y1="17" x2="32" y2="17" stroke="white" stroke-width="1" opacity="0.3"/>
  <line x1="8" y1="22" x2="32" y2="22" stroke="white" stroke-width="1" opacity="0.3"/>
  <!-- Dead pixel (bright red stuck pixel, center) -->
  <rect x="18.5" y="14" width="3" height="3" rx="0.5" fill="#FF3B30"/>
  <!-- Stand -->
  <line x1="20" y1="29" x2="20" y2="33" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <line x1="14" y1="33" x2="26" y2="33" stroke="white" stroke-width="2" stroke-linecap="round"/>
</svg>
