<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#B45309"/>
      <stop offset="100%" stop-color="#FDE68A"/>
    </linearGradient>
  </defs>
  <rect width="40" height="40" rx="10" fill="url(#g)"/>
  <!-- Full page (faded) -->
  <rect x="8" y="7" width="20" height="26" rx="2" fill="white" opacity="0.2"/>
  <rect x="8" y="7" width="20" height="26" rx="2" fill="none" stroke="white" stroke-width="1.5" stroke-dasharray="3,2" opacity="0.5"/>
  <!-- Crop region (solid) -->
