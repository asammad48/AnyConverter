<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40">
  <!-- Browser window frame -->
  <rect x="7" y="10" width="26" height="20" rx="3" fill="#B04A45" opacity="0.2"/>
  <rect x="7" y="10" width="26" height="20" rx="3" fill="none" stroke="#B04A45" stroke-width="1.8"/>
  <!-- Toolbar bar -->
  <line x1="7" y1="17" x2="33" y2="17" stroke="#B04A45" stroke-width="1.5" opacity="0.7"/>
  <!-- Traffic light dots -->
  <circle cx="11" cy="13.5" r="1.5" fill="#B04A45" opacity="0.8"/>
  <circle cx="15.5" cy="13.5" r="1.5" fill="#B04A45" opacity="0.55"/>
  <circle cx="20" cy="13.5" r="1.5" fill="#B04A45" opacity="0.35"/>
  <!-- URL bar -->
  <rect x="23" y="11.5" width="8" height="4" rx="2" fill="#B04A45" opacity="0.3"/>
  <!-- Content lines -->
  <line x1="11" y1="21" x2="29" y2="21" stroke="#B04A45" stroke-width="1.6" stroke-linecap="round" opacity="0.7"/>
  <line x1="11" y1="25" x2="25" y2="25" stroke="#B04A45" stroke-width="1.6" stroke-linecap="round" opacity="0.5"/>
</svg>
