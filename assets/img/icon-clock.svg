<svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Clock face -->
  <circle cx="20" cy="20" r="11" stroke="#B04A45" stroke-width="2.2" fill="none"/>
  <!-- Hour ticks at 12, 3, 6, 9 -->
  <line x1="20" y1="10" x2="20" y2="12.5" stroke="#B04A45" stroke-width="2" stroke-linecap="round"/>
  <line x1="30" y1="20" x2="27.5" y2="20" stroke="#B04A45" stroke-width="2" stroke-linecap="round"/>
  <line x1="20" y1="30" x2="20" y2="27.5" stroke="#B04A45" stroke-width="2" stroke-linecap="round"/>
  <line x1="10" y1="20" x2="12.5" y2="20" stroke="#B04A45" stroke-width="2" stroke-linecap="round"/>
  <!-- Hour hand (pointing ~10 o'clock) -->
  <line x1="20" y1="20" x2="15" y2="15" stroke="#B04A45" stroke-width="2.3" stroke-linecap="round"/>
  <!-- Minute hand (pointing ~2 o'clock) -->
  <line x1="20" y1="20" x2="25" y2="14" stroke="#B04A45" stroke-width="2" stroke-linecap="round"/>
  <!-- Center dot -->
  <circle cx="20" cy="20" r="2" fill="#B04A45"/>
</svg>
