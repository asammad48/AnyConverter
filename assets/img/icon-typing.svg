<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4F46E5"/>
      <stop offset="100%" stop-color="#818CF8"/>
    </linearGradient>
  </defs>
  <rect width="40" height="40" rx="10" fill="url(#g)"/>
  <!-- Keyboard body -->
  <rect x="5" y="18" width="30" height="16" rx="3" fill="white" opacity="0.18"/>
  <rect x="5" y="18" width="30" height="16" rx="3" fill="none" stroke="white" stroke-width="1.8"/>
  <!-- Key rows -->
  <rect x="8"  y="21" width="4" height="3" rx="1" fill="white" opacity="0.8"/>
  <rect x="14" y="21" width="4" height="3" rx="1" fill="white" opacity="0.8"/>
  <rect x="20" y="21" width="4" height="3" rx="1" fill="white" opacity="0.8"/>
  <rect x="26" y="21" width="4" height="3" rx="1" fill="white" opacity="0.8"/>
  <rect x="8"  y="26" width="4" height="3" rx="1" fill="white" opacity="0.7"/>
  <rect x="14" y="26" width="12" height="3" rx="1" fill="white" opacity="0.5"/>
  <rect x="28" y="26" width="4" height="3" rx="1" fill="white" opacity="0.7"/>
  <!-- WPM badge above -->
  <rect x="8" y="7" width="24" height="9" rx="4.5" fill="white" opacity="0.9"/>
  <text x="20" y="14" font-family="system-ui,sans-serif" font-size="7" font-weight="700" fill="#4F46E5" text-anchor="middle">WPM</text>
  <!-- Speed lines -->
  <line x1="3" y1="12" x2="7" y2="12" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
  <line x1="2" y1="9" x2="7" y2="9" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
</svg>
