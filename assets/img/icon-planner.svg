<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4776E6"/>
      <stop offset="100%" stop-color="#8E54E9"/>
    </linearGradient>
  </defs>
  <rect width="40" height="40" rx="10" fill="url(#g)"/>
  <!-- Calendar body -->
  <rect x="8" y="11" width="24" height="22" rx="3" fill="white" opacity="0.2"/>
  <rect x="8" y="11" width="24" height="22" rx="3" fill="none" stroke="white" stroke-width="2"/>
  <!-- Header bar -->
  <rect x="8" y="11" width="24" height="7" rx="3" fill="white" opacity="0.25"/>
  <line x1="8" y1="18" x2="32" y2="18" stroke="white" stroke-width="1.5" opacity="0.6"/>
  <!-- Pin tabs -->
  <line x1="14" y1="8" x2="14" y2="14" stroke="white" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="26" y1="8" x2="26" y2="14" stroke="white" stroke-width="2.2" stroke-linecap="round"/>
  <!-- Date grid dots (3x2) -->
  <circle cx="14" cy="23" r="1.5" fill="white"/>
  <circle cx="20" cy="23" r="1.5" fill="white"/>
  <circle cx="26" cy="23" r="1.5" fill="white"/>
  <circle cx="14" cy="29" r="1.5" fill="white"/>
  <circle cx="20" cy="29" r="1.5" fill="white"/>
  <!-- Highlighted today -->
  <rect x="23.5" y="26.5" width="5" height="5" rx="2" fill="white" opacity="0.9"/>
</svg>
