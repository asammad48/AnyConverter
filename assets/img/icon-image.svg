<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40">
  <!-- Photo frame -->
  <rect x="7" y="10" width="26" height="20" rx="3" fill="#B04A45" opacity="0.2"/>
  <rect x="7" y="10" width="26" height="20" rx="3" fill="none" stroke="#B04A45" stroke-width="1.8"/>
  <!-- Sun/circle in sky -->
  <circle cx="14" cy="16" r="3" fill="#B04A45" opacity="0.85"/>
  <!-- Mountain landscape -->
  <path d="M7,30 L14,20 L20,26 L25,19 L33,30 Z" fill="#B04A45" opacity="0.6"/>
  <!-- Compress arrows (bottom corners pointing inward) -->
  <polyline points="8,35 8,32 11,32" fill="none" stroke="#B04A45" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
  <polyline points="32,35 32,32 29,32" fill="none" stroke="#B04A45" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
