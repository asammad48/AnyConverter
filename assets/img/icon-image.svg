      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
  </defs>
  <rect width="40" height="40" rx="10" fill="url(#g)"/>
  <!-- Photo frame -->
  <rect x="7" y="10" width="26" height="20" rx="3" fill="white" opacity="0.2"/>
  <rect x="7" y="10" width="26" height="20" rx="3" fill="none" stroke="white" stroke-width="1.8"/>
