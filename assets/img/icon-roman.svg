  <line x1="15" y1="12" x2="8"  y2="22" stroke="#B04A45" stroke-width="2.2" stroke-linecap="round"/>
  <!-- I: single vertical line -->
  <line x1="19" y1="12" x2="19" y2="22" stroke="#B04A45" stroke-width="2.2" stroke-linecap="round"/>
  <!-- V: two diagonals -->
  <path d="M23 12 L26.5 22 L30 12" stroke="#B04A45" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Divider line -->
  <line x1="7" y1="25" x2="33" y2="25" stroke="#B04A45" stroke-width="1.6" stroke-linecap="round" opacity="0.7"/>
  <!-- Arabic numeral 14 hint below -->
  <line x1="17" y1="28" x2="17" y2="34" stroke="#B04A45" stroke-width="2" stroke-linecap="round"/>
  <path d="M13 30 L17 28 L17 34" stroke="#B04A45" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <line x1="21" y1="28" x2="21" y2="34" stroke="#B04A45" stroke-width="2" stroke-linecap="round"/>
  <path d="M21 28 Q25 28 25 31 Q25 34 21 34 L25 34" stroke="#B04A45" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>
