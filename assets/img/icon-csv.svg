<svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Table outer border -->
  <rect x="8" y="11" width="24" height="18" rx="2" stroke="#B04A45" stroke-width="2" fill="none"/>
  <!-- Header row separator -->
  <line x1="8" y1="17" x2="32" y2="17" stroke="#B04A45" stroke-width="2"/>
  <!-- Column separator (2 columns) -->
  <line x1="18" y1="11" x2="18" y2="29" stroke="#B04A45" stroke-width="1.8"/>
  <!-- Second data row line -->
  <line x1="8" y1="23" x2="32" y2="23" stroke="#B04A45" stroke-width="1.5" opacity="0.7"/>
  <!-- Small data dots to represent cell content -->
  <circle cx="13" cy="14" r="1.5" fill="#B04A45" opacity="0.85"/>
  <circle cx="25" cy="14" r="1.5" fill="#B04A45" opacity="0.85"/>
</svg>
