<svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="40" y2="40" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#818CF8"/>
      <stop offset="100%" stop-color="#4338CA"/>
    </linearGradient>
  </defs>
  <rect width="40" height="40" rx="10" fill="url(#g)"/>
  <!-- Stopwatch body -->
  <circle cx="20" cy="23" r="11" stroke="white" stroke-width="2.2" fill="none"/>
  <!-- Crown / top knob -->
  <rect x="17" y="9" width="6" height="3" rx="1.5" stroke="white" stroke-width="1.8" fill="none"/>
  <!-- Start button on top -->
  <line x1="20" y1="12" x2="20" y2="13" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Side button -->
  <line x1="29" y1="16" x2="31" y2="14" stroke="white" stroke-width="2.2" stroke-linecap="round"/>
  <!-- Minute hand (pointing ~11) -->
  <line x1="20" y1="23" x2="16" y2="17" stroke="white" stroke-width="2.3" stroke-linecap="round"/>
  <!-- Second hand (pointing ~2) -->
  <line x1="20" y1="23" x2="26" y2="19" stroke="white" stroke-width="1.8" stroke-linecap="round" opacity="0.8"/>
  <!-- Center pin -->
  <circle cx="20" cy="23" r="2" fill="white"/>
</svg>
