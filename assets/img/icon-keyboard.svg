<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40">
  <!-- Keyboard body -->
  <rect x="6" y="13" width="28" height="16" rx="3" fill="#B04A45" opacity="0.18"/>
  <rect x="6" y="13" width="28" height="16" rx="3" fill="none" stroke="#B04A45" stroke-width="1.8"/>
  <!-- Row 1: 5 small keys -->
  <rect x="9" y="16" width="4" height="3.5" rx="1" fill="#B04A45" opacity="0.8"/>
  <rect x="14.5" y="16" width="4" height="3.5" rx="1" fill="#B04A45" opacity="0.8"/>
  <rect x="20" y="16" width="4" height="3.5" rx="1" fill="#B04A45" opacity="0.8"/>
  <rect x="25.5" y="16" width="5.5" height="3.5" rx="1" fill="#B04A45" opacity="0.6"/>
  <!-- Row 2: 4 keys -->
  <rect x="9" y="21" width="5" height="3.5" rx="1" fill="#B04A45" opacity="0.8"/>
  <rect x="15.5" y="21" width="4" height="3.5" rx="1" fill="#B04A45" opacity="0.8"/>
  <rect x="21" y="21" width="4" height="3.5" rx="1" fill="#B04A45" opacity="0.8"/>
  <rect x="26.5" y="21" width="4.5" height="3.5" rx="1" fill="#B04A45" opacity="0.6"/>
